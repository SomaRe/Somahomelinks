<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma Home Lab</title>
    <link rel="icon" href="assets/images/logo-favicon.png" type="image/x-icon" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/images/logo-512.png">
    <meta name="theme-color" content="#0d6efd">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="SomaLab">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img src="assets/images/logo-512.png" alt="Logo" width="30" height="30" class="d-inline-block align-middle">
            <span class="navbar-brand mb-0 h1">Soma Home Lab Catalogue</span>
          </a>
        </div>
      </nav>
    <div class="container">
        <nav>
            <div class="nav nav-tabs justify-content-center pt-5" id="nav-tab" role="tablist">
                <button class="nav-link active" id="nav-apps-tab" data-bs-toggle="tab" data-bs-target="#nav-apps"
                    type="button" role="tab" aria-controls="nav-apps" aria-selected="true">Applications</button>
                <button class="nav-link" id="nav-media-tab" data-bs-toggle="tab" data-bs-target="#nav-media"
                    type="button" role="tab" aria-controls="nav-media" aria-selected="false">Media Server</button>
            </div>
        </nav>
        <div class="tab-content" id="nav-tabContent">
            <div class="row tab-pane fade show active" id="nav-apps" role="tabpanel" aria-labelledby="nav-apps-tab"
                tabindex="0">
                <div id="nav-apps-container"></div>
            </div>
            <div class="row tab-pane fade" id="nav-media" role="tabpanel" aria-labelledby="nav-media-tab"
                tabindex="0">
                <div id="nav-media-container"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>

</html>
